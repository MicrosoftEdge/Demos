<!doctype html>
<html lang="en">
  <head>
    <title>Highlight pseudo-elements</title>
  </head>
  <body>
    <div class="text-parent">
      <div class="highlighted-text">I inherited the style of my parent's highlight pseudo-element.  Select me!</div>
    </div>
    <style>
      .text-parent::selection {
        background: #ff0;
        color: #ff1493;
      }
    </style>
  </body>
</html>
