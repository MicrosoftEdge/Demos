<!DOCTYPE html>
<html>
<head>
  <title>View `@supports` at-rules</title>
</head>
<body>
  <div class="box">
  </div>
  <style>
    .box {
      width: 300px;
      height: 30px;
      text-align: center;
    }

    @supports (background: lab(0% 0 0)) {
      .box {
        background: lab(90% -44 55);
      }

      .box::after {
        content: "I support CIE LAB color space!";
      }
    }

    @supports not (background: lab(0% 0 0)) {
      .box {
        background:#c9b1d6;
      }
      
      .box::after {
        content: "I don\'t support CIE LAB color space :(";
      }
  }
  </style>
</body>
</html>
