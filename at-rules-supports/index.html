<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://edgestatic.azureedge.net/welcome/static/favicon.png">
  <title>View `@supports` at-rules</title>
</head>

<body>
  <div class="box">
  </div>
  <style>
    .box {
      width: 300px;
      height: 30px;
      text-align: center;
      align-content: center;
      font-family: system-ui;
    }

    @supports (background: lab(0% 0 0)) {
      .box {
        background: lab(90% -44 55);
      }

      .box::after {
        content: "I support CIE LAB color space!";
      }
    }

    @supports not (background: lab(0% 0 0)) {
      .box {
        background: #c9b1d6;
      }

      .box::after {
        content: "I don\'t support CIE LAB color space :(";
      }
    }
  </style>
</body>

</html>
