  <title>Item tolerance</title>
  <style>
    @supports not (display:grid-lanes) {
      body::before {
        content: "Your browser does not support CSS Grid Lanes.";
        position: fixed;
        inset: 50%;
        inline-size: 50vw;
        block-size: max-content;
        transform: translate(-50%, -50%);
        background: white;
        display: grid;
        place-items: center;
        font-size: 1.5rem;
        font-family: system-ui;
        text-align: center;
        padding: 1rem 2rem;
        z-index: 1;
        box-shadow: 0 0 1rem 0 #0004;
      }
    }

    body {
      margin: 0 4rem;
      font-family: system-ui;
      font-size: 1rem;
    }

    main {
      max-width: 1800px;
      margin: 4rem auto;
      display: grid-lanes;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      flow-tolerance: 0;
      counter-set: photo-counter 1;
    }

    main .photo {
      block-size: 150px;
      position: relative;
    }

    main .photo:nth-child(2n) {
      block-size: 160px;
    }

    main .photo:nth-child(3n) {
      block-size: 170px;
    }

    main .photo:nth-child(5n) {
      block-size: 180px;
    }

    main .photo:nth-child(7n) {
      block-size: 210px;
    }

    main .photo img {
      inline-size: 100%;
      block-size: 100%;
      object-fit: cover;
      display: block;
      border-radius: .5rem;
      counter-increment: photo-counter;
    }

    main .photo::before {
      content: counter(photo-counter);
      position: absolute;
      inline-size: 2rem;
      block-size: 2rem;
      display: grid;
      place-content: center;
      inset: calc(50% - 15px) auto auto calc(50% - 15px);
      border-radius: 50%;
      background: #fffe;
      border: 2px solid #0009;
    }

    .controls {
      position: fixed;
      z-index: 1;
      inset: 1rem 1rem auto auto;
      background: #eee;
      padding: .5rem 1rem;
      border-radius: .5rem;
      border: 2px solid #0009;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
  </style>
</head>

    const flowToleranceValue = document.getElementById('flow-tolerance-value');
    const layout = document.querySelector('main');

    flowToleranceRange.addEventListener('input', () => {
      const value = flowToleranceRange.value;
      flowToleranceValue.textContent = `${value}px`;
