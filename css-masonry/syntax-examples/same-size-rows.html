  <title>Same size rows</title>
  <style>
    @supports not (display:grid-lanes) {
      body::before {
        content: "Your browser does not support CSS Grid Lanes.";
        position: fixed;
        inset: 50%;
        inline-size: 50vw;
        block-size: max-content;
        transform: translate(-50%, -50%);
        background: white;
        display: grid;
        place-items: center;
        font-size: 1.5rem;
        font-family: system-ui;
        text-align: center;
        padding: 1rem 2rem;
        z-index: 1;
        box-shadow: 0 0 1rem 0 #0004;
      }
    }

    html {
      height: 100%;
    }

    body {
      margin: 3rem;
      height: calc(100% - 6rem);
      font-family: system-ui;
      font-size: 1rem;
    }

    main {
      height: 100%;
      display: grid-lanes;
      grid-template-rows: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    main .photo img {
      height: 100%;
      display: block;
      border-radius: .5rem;
    }
  </style>
</head>
