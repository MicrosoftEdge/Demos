<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Cascade layers</title>
  </head>
  <body>
    <div class="cascade-box"></div>
    <style>
      .cascade-box {
        width: 250px;
        height: 30px;
        text-align: center;
      }

      .cascade-box::after {
        content: "My styles are layered!";
      }

      /* Define the specificity */
      @layer base, component, page;

      @layer page {
        .cascade-box {
          background: palegreen;
        }
      }

      @layer base {
        .cascade-box {
          background: rebeccapurple;
        }
      }

      @layer component {
        .cascade-box {
          background: hotpink;
        }
      }
    </style>
  </body>
</html>
